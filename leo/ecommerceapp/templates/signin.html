{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In Lideraly Fc</title>
    <link rel="icon" type="image/png" href="{% static 'images/la.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <img class="head-badge" src="/static/images/la.png" alt="Badge">
    <header class="signin-head">
        <img class="don" src="/static/images/don.png" alt="Don">
        
        <div class="auth-container">
            <h3>Sign In</h3>
            
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
                <a class="btn-submit" href="/">Skip</a>
            </form>
            
            <div class="auth-link">
                Don't have an account? <a href="{% url 'signup' %}">Create one</a>
            </div>
        </div>
    </header>
</body>
</html>
